name: Sync to Hugging Face hub
on:
  push:
    branches: [main]

  # to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Remove binary files
          rm -f nexusai_history.db
          
          # 2. Strip history to avoid pushing binary commits
          rm -rf .git
          
          # 3. Initialize fresh repo
          git init
          git branch -M main
          git config --global user.email "ajeet9843@users.noreply.github.com"
          git config --global user.name "ajeet9843"
          
          # 4. Add files and push clean snapshot
          git add .
          git commit -m "Deploy to Hugging Face Spaces"
          git push --force https://ajeet9843:$HF_TOKEN@huggingface.co/spaces/ajeet9843/NextQuest.ai main
