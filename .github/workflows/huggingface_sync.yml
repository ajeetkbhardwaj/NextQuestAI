name: Sync to Hugging Face hub
on:
  push:
    branches: [main]

  # to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Ensure no database files are present in the push
          rm -f nexusai_history.db
          git config --global user.email "ajeet9843@users.noreply.github.com"
          git config --global user.name "ajeet9843"
          git add .
          # Only commit if there are changes (like the deletion)
          git commit -m "Cleanup for Hugging Face" || echo "No changes to cleanup"
          git push --force https://ajeet9843:$HF_TOKEN@huggingface.co/spaces/ajeet9843/NextQuest.ai main
