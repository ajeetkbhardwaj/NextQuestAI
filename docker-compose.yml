version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: nexus-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - nexus-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  nexusai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-ai
    ports:
      - "7860:7860"
    environment:
      - LLM_PROVIDER=ollama
      - LLM_MODEL=gemma4:e2b
      - OLLAMA_BASE_URL=http://ollama:11434/v1
      - SEARCH_PROVIDER=duckduckgo
      - STREAMING=true
      - DEEP_RESEARCH=true
    depends_on:
      - ollama
    networks:
      - nexus-network
    restart: unless-stopped

volumes:
  ollama_data:

networks:
  nexus-network:
    driver: bridge